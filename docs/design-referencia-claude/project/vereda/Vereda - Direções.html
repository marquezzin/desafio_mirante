<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vereda — Tela principal · 3 direções</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Hanken Grotesk',system-ui,sans-serif}
  .frame{width:1440px;height:900px;border:0;display:block;background:#fff}
  .reason{width:1180px;background:#fff;border:1px solid #e6e2da;border-radius:16px;padding:32px 36px;box-shadow:0 10px 30px rgba(40,30,15,.06)}
  .reason h2{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:0 0 6px;color:#211d16}
  .reason .sub{font-size:14px;color:#8a8475;margin:0 0 22px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .rc{border:1px solid #eceae3;border-radius:12px;padding:18px 18px 20px;background:#fcfbf8}
  .rc .badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:6px;margin-bottom:10px}
  .rc.a .badge{background:#eff4ff;color:#2563eb}
  .rc.b .badge{background:#f7ecdd;color:#b5651d}
  .rc.c .badge{background:#e7f4ee;color:#15795a}
  .rc h3{font-size:16px;font-weight:800;margin:0 0 7px;color:#211d16}
  .rc p{font-size:13px;line-height:1.6;color:#5b5648;margin:0 0 10px}
  .rc ul{margin:0;padding-left:16px}
  .rc li{font-size:12.5px;line-height:1.65;color:#6b6555;margin-bottom:3px}
  .note{margin-top:20px;font-size:13px;line-height:1.6;color:#6b6555;border-top:1px solid #eceae3;padding-top:16px}
  .note b{color:#211d16}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App(){
  return (
    <DesignCanvas>
      <DCSection id="contexto" title="Vereda · Tela principal" subtitle="Workspace Investigar — chat com citação clicável + painel de fonte. 3 tratamentos visuais pra você escolher.">
        <DCArtboard id="reason" label="Raciocínio de design" width={1180} height={560}>
          <div className="reason">
            <h2>O que estou resolvendo nesta tela</h2>
            <p className="sub">A tela-âncora do protótipo. É aqui que mora o diferencial: conversa no centro, confiança em volta.</p>
            <div className="grid3">
              <div className="rc a">
                <span className="badge">A · Documento</span>
                <h3>Branco / grafite / azul</h3>
                <p>A sua cor escolhida (opção 2). Limpo, institucional, "sério de SaaS B2B". A resposta vem em fluxo de texto com cartão de recomendação azul.</p>
                <ul><li>Mais neutro e seguro</li><li>Citação em pílula azul</li><li>Familiar pro Comitê</li></ul>
              </div>
              <div className="rc b">
                <span className="badge">B · Terrosa</span>
                <h3>Papel mineiro</h3>
                <p>Papel cru, argila + musgo, motivo de trilha na marca. A resposta é um "cartão de campo" com filete de trilha na lateral. Carrega a carga simbólica do nome.</p>
                <ul><li>Personalidade e memorabilidade</li><li>Voz mineira, sem anglicismo</li><li>Risco: menos "corporativo"</li></ul>
              </div>
              <div className="rc c">
                <span className="badge">C · Copilot</span>
                <h3>Chrome escuro, dado em foco</h3>
                <p>Navegação escura + workspace claro, acento verde-pasto. A recomendação vira bloco analítico com gráfico de banda de confiança e peso dos drivers.</p>
                <ul><li>Mais "produto de IA 2026"</li><li>Dado em primeiro plano</li><li>Atende sua escolha de gráficos de verdade</li></ul>
              </div>
            </div>
            <div className="note"><b>Comum às três:</b> humanist sans (Hanken Grotesk), citações numeradas clicáveis, painel de fonte à direita com trecho em amarelo, banda de confiança visível, botão "Como cheguei aqui", chips de pergunta sugerida. Escolha o clima — a estrutura é a mesma e eu construo o app conectado (5 cenas + calibração) na direção que você cravar. Dá pra misturar (ex.: layout do A com o bloco analítico do C).</div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="direcoes" title="As 3 direções, ao vivo" subtitle="Telas reais (estado estático para a escolha visual — a interação completa vem no app conectado). Abra em foco (↗) pra ver em tamanho cheio.">
        <DCArtboard id="a" label="A · Documento (branco/grafite/azul)" width={1440} height={900}>
          <iframe className="frame" src="explorations/dir-a-documento.html" title="A"></iframe>
        </DCArtboard>
        <DCArtboard id="b" label="B · Terrosa (papel mineiro)" width={1440} height={900}>
          <iframe className="frame" src="explorations/dir-b-terrosa.html" title="B"></iframe>
        </DCArtboard>
        <DCArtboard id="c" label="C · Copilot (chrome escuro, dado em foco)" width={1440} height={900}>
          <iframe className="frame" src="explorations/dir-c-copilot.html" title="C"></iframe>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
